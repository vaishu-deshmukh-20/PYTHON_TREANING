<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Government Polytechnic Hingoli</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body style="background-color:white;">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm"
style="background: linear-gradient(90deg,#fd0dc5,#1f10f2);">

    <div class="container">

        <a class="navbar-brand fw-bold" href="#">
            🏫 GPH Portal
        </a>

        <div class="navbar-nav ms-auto">

            <a class="nav-link text-white"
               href="{{ url_for('add_students') }}">
               ➕ Add Student
            </a>

            <a class="nav-link text-white"
               href="{{ url_for('home') }}">
               🏠 Home
            </a>

            <a class="nav-link text-white"
               href="{{ url_for('about') }}">
               ℹ️ About
            </a>

            <a class="nav-link text-white"
               href="{{ url_for('students_page') }}">
               👩‍🎓 Students
            </a>

            <a class="nav-link text-white"
               href="{{ url_for('notice') }}">
               📢 Notice
            </a>
            <form class="d-flex" action="/search" method="get">
                <input class="form-control me-2" type="search" name="query" placeholder="Search Students" aria-label="Search">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form> 
        </div>

    </div>

</nav>

<!-- Main Content -->
<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<!-- Footer -->
<footer class="text-center text-white py-3 mt-5"
style="
background: linear-gradient(135deg,#395176,#bf42c1);
box-shadow: 0 -5px 15px rgba(0, 0, 0, 0.15);
">

    🎓College Smart Portal | ✨ A Creation by Vaishnavi Deshmukh✨ | © <span id="year"></span>

</footer>

<script>
document.getElementById("year").innerHTML =
new Date().getFullYear();
</script>
