{% extends "base.html" %}
{% block title %}Add Students — College Portal{% endblock %}

{% block content %}

<div class="row justify-content-center mt-4">
    <div class="col-md-6">    <div class="card shadow-lg border-0">

        <div class="card-header text-white"
             style="background: linear-gradient(135deg,#6a0572,#8e044d);">
            <h5 class="mb-0">➕ Add New Student</h5>
        </div>

        <div class="card-body p-4">

            <form action="{{ url_for('add_students') }}" method="POST">

                <div class="mb-3">
                    <label class="form-label">Student Name</label>
                    <input
                        type="text"
                        name="student_name"
                        class="form-control"
                        placeholder="Enter Student Name"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Marks</label>
                    <input
                        type="number"
                        name="marks"
                        min="0"
                        max="100"
                        class="form-control"
                        placeholder="Enter Marks"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Roll Number</label>
                    <input
                        type="number"
                        name="roll"
                        min="100"
                        max="999"
                        class="form-control"
                        placeholder="Enter Roll Number"
                        required>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Save Student
                </button>

            </form>

        </div>

    </div>

</div>

</div>{% endblock %}
